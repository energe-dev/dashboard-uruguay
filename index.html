<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Energe Uruguay — Cierre</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --eg:#FF6B00;--eg-dim:rgba(255,107,0,0.12);--eg-border:rgba(255,107,0,0.3);--eg-light:#FF8C35;
  --bg0:#0e0c0a;--bg1:#151210;--bg2:#1c1815;--bg3:#231e1a;
  --txt1:#ede8e3;--txt2:#9e9089;--txt3:#5e5550;
  --red:#ff4b4b;--amber:#f5c623;--blue:#4bc9ff;--border:rgba(255,255,255,0.07);
}
body{background:var(--bg0);font-family:'Barlow',sans-serif;color:var(--txt1);min-height:100vh}
.header{background:var(--bg1);border-bottom:1px solid var(--eg-border);padding:0.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:14px}
.logo-img{height:38px;object-fit:contain}
.logo-sep{width:1px;height:32px;background:var(--eg-border)}
.logo-sub{font-size:10px;color:var(--eg);letter-spacing:3px;text-transform:uppercase;font-weight:600}
.logo-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--txt1);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.header-tag{background:var(--eg-dim);border:1px solid var(--eg-border);color:var(--eg);font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;letter-spacing:2px;text-transform:uppercase}
.currency-toggle{display:flex;gap:3px;background:var(--bg3);border-radius:20px;padding:3px}
.cur-btn{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;cursor:pointer;color:var(--txt3);border:none;background:transparent;transition:all 0.15s;font-family:'Barlow',sans-serif}
.cur-btn.active{background:var(--eg);color:#fff}
.sheets-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-btn{background:var(--eg);color:#fff;border:none;font-size:12px;font-weight:600;padding:7px 20px;border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap;transition:opacity 0.15s}
.sync-btn:hover{opacity:0.85}
.sync-btn:disabled{opacity:0.4;cursor:not-allowed}
.sync-status{font-size:11px;color:var(--txt3)}
.sync-ok{color:var(--eg)}
.sync-err{color:var(--red)}
.sections{padding:1.5rem;max-width:1200px;margin:0 auto}
.sec{margin-bottom:2.5rem}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--eg);letter-spacing:3px;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.kpi-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1}
.kpi-cur{font-size:10px;color:var(--txt2);margin-top:3px}
.kpi.orange .kpi-val{color:var(--eg)}
.kpi.red .kpi-val{color:var(--red)}
.kpi.amber .kpi-val{color:var(--amber)}
.kpi.blue .kpi-val{color:var(--blue)}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.filter-btn{background:var(--bg2);border:1px solid var(--border);color:var(--txt2);font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s}
.filter-btn:hover{border-color:var(--eg-border);color:var(--txt1)}
.filter-btn.active{background:var(--eg-dim);border-color:var(--eg-border);color:var(--eg)}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
th{background:var(--bg3);color:var(--txt3);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;color:var(--txt1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,107,0,0.04)}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.badge-open{background:rgba(255,75,75,0.15);color:#ff7575;border:1px solid rgba(255,75,75,0.3)}
.badge-paid{background:rgba(255,107,0,0.12);color:var(--eg-light);border:1px solid var(--eg-border)}
.badge-wait{background:rgba(245,198,35,0.15);color:#f5d060;border:1px solid rgba(245,198,35,0.3)}
.badge-pend{background:rgba(75,201,255,0.12);color:#7dd6ff;border:1px solid rgba(75,201,255,0.3)}
.badge-ok{background:rgba(255,107,0,0.12);color:var(--eg-light);border:1px solid var(--eg-border)}
.badge-issue{background:rgba(255,75,75,0.15);color:#ff7575;border:1px solid rgba(255,75,75,0.3)}
.badge-warning{background:rgba(245,198,35,0.15);color:#f5d060;border:1px solid rgba(245,198,35,0.3)}
.editable{background:transparent;border:none;border-bottom:1px solid var(--txt3);color:var(--txt1);font-size:12px;font-family:'Barlow',sans-serif;width:100%;min-width:140px;outline:none;padding:2px 4px;transition:border-color 0.15s}
.editable:focus{border-bottom-color:var(--eg);color:var(--eg)}
.bps-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bps-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px}
.bps-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.bps-item:last-child{border-bottom:none}
.bps-label{font-size:12px;color:var(--txt2)}
.bps-amount{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--red)}
.stock-num{background:var(--bg3);color:var(--eg);font-size:11px;font-weight:700;min-width:32px;height:24px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center}
.no-rows{padding:2rem;text-align:center;color:var(--txt3);font-size:13px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--eg-border);border-top-color:var(--eg);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.vendedores-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.2rem}
.vend-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.vend-header{background:var(--bg3);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.vend-avatar{width:38px;height:38px;border-radius:50%;background:var(--eg-dim);border:2px solid var(--eg-border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--eg);flex-shrink:0}
.vend-info{flex:1;margin-left:12px}
.vend-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--txt1)}
.vend-fecha{font-size:11px;color:var(--txt3);margin-top:2px}
.vend-liq{text-align:right}
.vend-liq-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px}
.vend-liq-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--amber);line-height:1.1}
.vend-body{padding:14px 16px}
.vend-section-label{font-size:10px;color:var(--eg);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:8px;margin-top:12px}
.vend-section-label:first-child{margin-top:0}
.vend-prod-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.vend-prod-row:last-child{border-bottom:none}
.vend-prod-name{font-size:12px;color:var(--txt1);flex:1}
.vend-prod-qty{font-size:11px;color:var(--txt3);margin:0 12px;white-space:nowrap}
.vend-prod-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--eg);white-space:nowrap}
.vend-prod-desc{font-size:11px;color:var(--txt3);margin-top:2px}
.vend-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px;border-top:1px solid var(--eg-border)}
.vend-total-label{font-size:11px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.vend-total-val{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--amber)}
.vend-comentario{font-size:12px;color:var(--txt2);padding:8px 0;line-height:1.6}
.vend-estado{display:flex;align-items:center;gap:8px;padding:8px 0}
@media(max-width:600px){.bps-wrap{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.header{padding:.75rem 1rem}.sections{padding:1rem}.vendedores-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <img class="logo-img" src="https://energe.com.ar/wp-content/uploads/2020/04/cropped-Energe-color.png" alt="Energe"
      onerror="this.style.display='none';document.getElementById('logoFb').style.display='flex'"/>
    <div id="logoFb" style="display:none;align-items:center;justify-content:center;width:36px;height:36px;background:var(--eg);border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:#fff;font-size:16px">E</div>
    <div class="logo-sep"></div>
    <div>
      <div class="logo-name">Uruguay</div>
      <div class="logo-sub">Cierre de operaciones</div>
    </div>
  </div>
  <div class="header-right">
    <div class="currency-toggle">
      <button class="cur-btn active" id="btnUYU" onclick="setCurrency('UYU')">UYU</button>
      <button class="cur-btn" id="btnUSD" onclick="setCurrency('USD')">USD</button>
    </div>
    <div class="header-tag" id="connTag">Cargando...</div>
  </div>
</div>

<div class="sheets-bar">
  <button class="sync-btn" id="syncBtn" onclick="syncAll()">⟳ Actualizar datos</button>
  <span class="sync-status" id="syncStatus"><span class="spinner"></span>Cargando...</span>
</div>

<div class="sections">
  <div class="sec">
    <div class="sec-title">Proveedores</div>
    <div class="kpis" id="kpis"></div>
    <div class="filters" id="filterBtns"></div>
    <div class="table-wrap">
      <table><thead><tr><th>Proveedor</th><th>Monto adeudado</th><th>Estado</th><th>Comentario</th></tr></thead>
      <tbody id="provTbody"></tbody></table>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Deuda BPS</div>
    <div class="bps-wrap" id="bpsWrap"></div>
  </div>
  <div class="sec">
    <div class="sec-title">Stock Energe</div>
    <div class="table-wrap">
      <table><thead><tr><th>Ítem</th><th style="text-align:center">Cant.</th><th>Valor unit.</th><th>Total</th><th>Ubicación</th></tr></thead>
      <tbody id="stockTbody"></tbody></table>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Estado de servicios</div>
    <div class="table-wrap">
      <table><thead><tr><th>Servicio</th><th>Estado</th><th>Deuda</th><th>Comentario (editable)</th></tr></thead>
      <tbody id="servTbody"></tbody></table>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Liquidaciones ex vendedores</div>
    <div class="vendedores-grid" id="vendedoresGrid"></div>
  </div>
</div>

<script>
const SHEET_ID = '1i6fRsib-w-1co4BAyFnNUkXWkI6X6-Kak6XyEqFJ1vI';
const GIDS = {
  proveedores: 0,
  bps: 100045881,
  stock: 21464391,
  servicios: 1609268816,
  vendedores: 1100753393,
  vendedoresProductos: 789479455
};
const FX = 38.5;
let currency = 'UYU';
let activeFilter = 'todos';
let proveedores=[], bpsData=[], stock=[], servicios=[], vendedores=[], vendProductos=[];

function num(s) {
  if (s === null || s === undefined || s === '') return 0;
  s = String(s).trim().replace(/[$\s]/g, '');
  if (!s) return 0;
  if (/\d\.\d{3}/.test(s) && s.includes(',')) s = s.replace(/\./g,'').replace(',','.');
  else if (/,\d{3}/.test(s) && !s.includes('.')) s = s.replace(/,/g,'');
  else s = s.replace(',','.');
  return parseFloat(s.replace(/[^0-9.\-]/g,'')) || 0;
}
function int(s) { return parseInt((s||'0').replace(/[^0-9]/g,'')) || 0; }

// Parse one CSV line respecting quoted fields
function parseCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else { inQ = !inQ; } }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

async function fetchCSV(gid) {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
            '/gviz/tq?tqx=out:csv&gid=' + gid + '&t=' + Date.now();
  var resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status + ' al cargar hoja ' + gid);
  var text = await resp.text();
  var lines = text.split('\n').map(function(l){ return l.replace(/\r/g,''); });
  // First line is always header — skip it
  return lines.slice(1)
    .filter(function(l){ return l.trim() !== ''; })
    .map(parseCSVLine);
}

async function syncAll() {
  var btn = document.getElementById('syncBtn');
  btn.disabled = true;
  document.getElementById('syncStatus').innerHTML = '<span class="spinner"></span>Sincronizando...';
  document.getElementById('connTag').textContent = 'Cargando...';
  try {
    var results = await Promise.all([
      fetchCSV(GIDS.proveedores),
      fetchCSV(GIDS.bps),
      fetchCSV(GIDS.stock),
      fetchCSV(GIDS.servicios),
      fetchCSV(GIDS.vendedores),
      fetchCSV(GIDS.vendedoresProductos)
    ]);
    var pR=results[0], bR=results[1], sR=results[2], svR=results[3], vR=results[4], vpR=results[5];

    if(pR.length) proveedores = pR.map(function(r){return {nombre:r[0],monto_uyu:num(r[1]),estado:r[2]||'Abierto',comentario:r[3]||''};});
    if(bR.length) bpsData = bR.map(function(r){return {concepto:r[0],monto_uyu:num(r[1])};}).filter(function(b){return b.concepto;});
    if(sR.length) stock = sR.map(function(r){return {item:r[0],cant:int(r[1]),valor_uyu:num(r[2]),ubicacion:r[3]||''};}).filter(function(x){return x.item;});
    if(svR.length) servicios = svR.map(function(r){return {servicio:r[0],estado:r[1]||'Activo',deuda_uyu:num(r[2]),comentario:r[3]||''};}).filter(function(x){return x.servicio;});
    vendedores = vR.length ? vR.map(function(r){return {nombre:r[0],liquidacion_uyu:num(r[1]),fecha:r[2]||'',estado:r[3]||'Liquidado',comentario:r[4]||''};}) : [];
    vendProductos = vpR.length ? vpR.map(function(r){return {vendedor:r[0],producto:r[1],cantidad:int(r[2]),valor_uyu:num(r[3]),descripcion:r[4]||''};}).filter(function(p){return p.vendedor;}) : [];

    var now = new Date().toLocaleString('es-UY',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    document.getElementById('syncStatus').innerHTML = '<span class="sync-ok">✓ Actualizado · ' + now + '</span>';
    document.getElementById('connTag').textContent = 'Conectado';
    render();
  } catch(e) {
    document.getElementById('syncStatus').innerHTML = '<span class="sync-err">✕ ' + e.message + '</span>';
    document.getElementById('connTag').textContent = 'Error';
    console.error(e);
  }
  btn.disabled = false;
}

function fmt(uyu) {
  if (currency==='UYU') return '$ ' + Math.round(uyu).toLocaleString('es-UY');
  return 'U$S ' + Math.round(uyu/FX).toLocaleString('es-UY');
}
function badgeProv(e) {
  var m={'Abierto':'badge-open','Pagado':'badge-paid','Esperando respuesta':'badge-wait','Pendiente de pago':'badge-pend'};
  return '<span class="badge '+(m[e]||'badge-open')+'">'+e+'</span>';
}
function badgeServ(e) {
  if(e==='Activo') return '<span class="badge badge-ok">Activo</span>';
  if(e==='Suspendido') return '<span class="badge badge-issue">Suspendido</span>';
  return '<span class="badge badge-warning">'+e+'</span>';
}
function badgeVend(e) {
  if(e==='Liquidado') return '<span class="badge badge-paid">Liquidado</span>';
  if(e==='Pendiente') return '<span class="badge badge-pend">Pendiente</span>';
  return '<span class="badge badge-warning">'+e+'</span>';
}
function setCurrency(c) {
  currency=c;
  document.getElementById('btnUYU').classList.toggle('active',c==='UYU');
  document.getElementById('btnUSD').classList.toggle('active',c==='USD');
  render();
}
function setFilter(f) {
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.f===f);});
  renderProv();
}
function renderKpis() {
  var arr=proveedores.filter(function(p){return p.estado==='Pagado';}).reduce(function(s,p){return s+p.monto_uyu;},0);
  var pen=proveedores.filter(function(p){return p.estado!=='Pagado';}).reduce(function(s,p){return s+p.monto_uyu;},0);
  var bps=bpsData.reduce(function(s,b){return s+b.monto_uyu;},0);
  var stk=stock.reduce(function(s,i){return s+i.cant*i.valor_uyu;},0);
  var cur=currency==='UYU'?'pesos uruguayos':'dólares';
  document.getElementById('kpis').innerHTML=
    '<div class="kpi orange"><div class="kpi-label">Dinero arreglado</div><div class="kpi-val">'+fmt(arr)+'</div><div class="kpi-cur">'+cur+'</div></div>'+
    '<div class="kpi red"><div class="kpi-label">Dinero pendiente</div><div class="kpi-val">'+fmt(pen)+'</div><div class="kpi-cur">'+cur+'</div></div>'+
    '<div class="kpi amber"><div class="kpi-label">Deuda BPS</div><div class="kpi-val">'+fmt(bps)+'</div><div class="kpi-cur">'+cur+'</div></div>'+
    '<div class="kpi blue"><div class="kpi-label">Valor stock</div><div class="kpi-val">'+fmt(stk)+'</div><div class="kpi-cur">'+cur+'</div></div>';
}
function renderFilters() {
  var estados=['todos','Abierto','Pagado','Esperando respuesta','Pendiente de pago'];
  document.getElementById('filterBtns').innerHTML=estados.map(function(e){
    return '<button class="filter-btn'+(activeFilter===e?' active':'')+'" data-f="'+e+'" onclick="setFilter(\''+e+'\')">'+( e==='todos'?'Todos':e)+'</button>';
  }).join('');
}
function renderProv() {
  var f=activeFilter==='todos'?proveedores:proveedores.filter(function(p){return p.estado===activeFilter;});
  if(!f.length){document.getElementById('provTbody').innerHTML='<tr><td colspan="4"><div class="no-rows">Sin registros</div></td></tr>';return;}
  document.getElementById('provTbody').innerHTML=f.map(function(p){
    return '<tr><td style="font-weight:500">'+p.nombre+'</td>'+
    '<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:600">'+fmt(p.monto_uyu)+'</td>'+
    '<td>'+badgeProv(p.estado)+'</td>'+
    '<td style="font-size:12px;color:var(--txt2);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+p.comentario+'">'+p.comentario+'</td></tr>';
  }).join('');
}
function renderBPS() {
  var total=bpsData.reduce(function(s,b){return s+b.monto_uyu;},0);
  document.getElementById('bpsWrap').innerHTML=
    '<div class="bps-card"><div style="font-size:10px;color:var(--eg);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:12px">Desglose</div>'+
    bpsData.map(function(b){return '<div class="bps-item"><span class="bps-label">'+b.concepto+'</span><span class="bps-amount">'+fmt(b.monto_uyu)+'</span></div>';}).join('')+'</div>'+
    '<div class="bps-card" style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;text-align:center">'+
    '<div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:2px">Total adeudado BPS</div>'+
    '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:40px;font-weight:700;color:var(--red);line-height:1">'+fmt(total)+'</div>'+
    '<div style="font-size:10px;color:var(--txt3)">'+(currency==='UYU'?'pesos uruguayos':'dólares')+'</div></div>';
}
function renderStock() {
  document.getElementById('stockTbody').innerHTML=stock.map(function(s){
    return '<tr><td style="font-weight:500">'+s.item+'</td>'+
    '<td style="text-align:center"><span class="stock-num">'+s.cant+'</span></td>'+
    '<td>'+fmt(s.valor_uyu)+'</td>'+
    '<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;font-weight:600;color:var(--eg)">'+fmt(s.cant*s.valor_uyu)+'</td>'+
    '<td style="font-size:11px;color:var(--txt3)">'+s.ubicacion+'</td></tr>';
  }).join('');
}
function renderServ() {
  document.getElementById('servTbody').innerHTML=servicios.map(function(s,i){
    return '<tr><td style="font-weight:500">'+s.servicio+'</td>'+
    '<td>'+badgeServ(s.estado)+'</td>'+
    '<td style="font-family:\'Barlow Condensed\',sans-serif;font-size:14px;color:'+(s.deuda_uyu>0?'var(--red)':'var(--txt3)')+'">'+( s.deuda_uyu>0?fmt(s.deuda_uyu):'—')+'</td>'+
    '<td><input class="editable" data-i="'+i+'" value="'+s.comentario+'" onchange="servicios[this.dataset.i].comentario=this.value"/></td></tr>';
  }).join('');
}
function renderVendedores() {
  var grid=document.getElementById('vendedoresGrid');
  if(!vendedores.length){grid.innerHTML='<div class="no-rows">Sin datos de vendedores</div>';return;}
  grid.innerHTML=vendedores.map(function(v){
    var prods=vendProductos.filter(function(p){return p.vendedor===v.nombre;});
    var totalProds=prods.reduce(function(s,p){return s+(p.cantidad*p.valor_uyu);},0);
    return '<div class="vend-card">'+
      '<div class="vend-header">'+
      '<div class="vend-avatar">'+v.nombre.charAt(0).toUpperCase()+'</div>'+
      '<div class="vend-info"><div class="vend-name">'+v.nombre+'</div><div class="vend-fecha">'+(v.fecha?'Liquidado: '+v.fecha:'Sin fecha')+'</div></div>'+
      '<div class="vend-liq"><div class="vend-liq-label">Liquidación</div><div class="vend-liq-val">'+fmt(v.liquidacion_uyu)+'</div></div>'+
      '</div><div class="vend-body">'+
      '<div class="vend-estado"><span style="font-size:11px;color:var(--txt3)">Estado:</span>'+badgeVend(v.estado)+'</div>'+
      (v.comentario?'<div class="vend-comentario">'+v.comentario+'</div>':'')+
      '<div class="vend-section-label">Productos retirados</div>'+
      (prods.length?prods.map(function(p){
        return '<div class="vend-prod-row"><div><div class="vend-prod-name">'+p.producto+'</div>'+
        (p.descripcion?'<div class="vend-prod-desc">'+p.descripcion+'</div>':'')+
        '</div><span class="vend-prod-qty">x'+p.cantidad+'</span>'+
        '<span class="vend-prod-val">'+fmt(p.cantidad*p.valor_uyu)+'</span></div>';
      }).join(''):'<div style="font-size:12px;color:var(--txt3);padding:8px 0">Sin productos</div>')+
      (prods.length?'<div class="vend-total-row"><span class="vend-total-label">Total productos</span><span class="vend-total-val">'+fmt(totalProds)+'</span></div>':'')+
      '</div></div>';
  }).join('');
}
function render(){renderKpis();renderFilters();renderProv();renderBPS();renderStock();renderServ();renderVendedores();}
syncAll();
</script>
</body>
</html>
